<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CF AI Internet Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #app { width: 100%; max-width: 720px; height: 90vh; display: flex; flex-direction: column; border: 1px solid #2d3748; border-radius: 12px; overflow: hidden; }
    header { background: #f6821f; padding: 16px 20px; font-weight: 700; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
    header span { font-size: 0.8rem; font-weight: 400; opacity: 0.85; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; font-size: 0.92rem; }
    .user { align-self: flex-end; background: #2b6cb0; }
    .assistant { align-self: flex-start; background: #1a202c; border: 1px solid #2d3748; }
    .thinking { opacity: 0.5; font-style: italic; }
    #input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid #2d3748; background: #0f1117; }
    #input { flex: 1; background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 0.92rem; outline: none; }
    #input:focus { border-color: #f6821f; }
    button { background: #f6821f; border: none; border-radius: 8px; padding: 10px 18px; color: white; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #clear { background: transparent; border: 1px solid #2d3748; font-size: 0.8rem; padding: 6px 12px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      🌐 CF AI Internet Monitor
      <span>Powered by Llama 3.3 · Cloudflare Workers AI</span>
    </header>
    <div id="messages">
      <div class="msg assistant">👋 Ask me anything about Internet infrastructure, networking, DNS, BGP, DDoS, or Cloudflare technologies.</div>
    </div>
    <div id="input-row">
      <input id="input" placeholder="e.g. How does BGP routing work?" />
      <button id="clear">Clear</button>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const sessionId = crypto.randomUUID();
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/\n/g, "<br>");
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;
      inputEl.value = "";
      sendBtn.disabled = true;

      addMessage("user", message);
      const thinking = addMessage("assistant", "Thinking…");
      thinking.classList.add("thinking");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, message }),
        });
        const data = await res.json();
        thinking.remove();
        addMessage("assistant", data.reply ?? data.error);
      } catch (e) {
        thinking.remove();
        addMessage("assistant", "Error: " + e.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => e.key === "Enter" && send());
    clearBtn.addEventListener("click", async () => {
      await fetch("/api/chat", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId }),
      });
      messagesEl.innerHTML = '<div class="msg assistant">Chat cleared. Ask me anything!</div>';
    });
  </script>
</body>
</html>
