name = "cf-ai-internet-monitor"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "CHAT_SESSION"
class_name = "ChatSession"

[[migrations]]
tag = "v1"
new_classes = ["ChatSession"]

[[workflows]]
name = "chat-workflow"
binding = "CHAT_WORKFLOW"
class_name = "ChatWorkflow"

[assets]
directory = "./public"
